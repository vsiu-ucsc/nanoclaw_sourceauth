# LiteLLM proxy config for non-Anthropic models in the cross-model runner.
#
# Start with:   litellm --config benchmark/litellm_config.yaml --port 4000
# Or run via:   benchmark/run_cross_model.sh (handles proxy lifecycle)
#
# Env vars consumed (populate in .env or export before running):
#   OPENAI_API_KEY       — GPT-5 family
#   GEMINI_API_KEY       — Gemini family
#   XAI_API_KEY          — Grok family
#   MOONSHOT_API_KEY     — Kimi family
#   FIREWORKS_API_KEY    — Qwen / open models via Fireworks
#   TOGETHER_API_KEY     — alternate provider for open models

model_list:
  # ───────────────────── OpenAI ─────────────────────
  - model_name: gpt-5
    litellm_params:
      model: openai/gpt-5
      api_key: os.environ/OPENAI_API_KEY
  - model_name: gpt-5.4
    litellm_params:
      model: openai/gpt-5.4
      api_key: os.environ/OPENAI_API_KEY

  # ───────────────────── Google ─────────────────────
  - model_name: gemini-2.5-pro
    litellm_params:
      model: gemini/gemini-2.5-pro
      api_key: os.environ/GEMINI_API_KEY
  - model_name: gemini-3.1-pro
    litellm_params:
      model: gemini/gemini-3.1-pro
      api_key: os.environ/GEMINI_API_KEY

  # ───────────────────── xAI ─────────────────────
  - model_name: grok-4.20
    litellm_params:
      model: xai/grok-4-20
      api_key: os.environ/XAI_API_KEY

  # ───────────────────── Moonshot ─────────────────────
  - model_name: kimi-k2.5
    litellm_params:
      model: moonshot/kimi-k2.5
      api_key: os.environ/MOONSHOT_API_KEY

  # ───────────────────── Open models via Fireworks ─────────────────────
  - model_name: qwen-3.5-397b
    litellm_params:
      model: fireworks_ai/accounts/fireworks/models/qwen-3p5-397b-instruct
      api_key: os.environ/FIREWORKS_API_KEY
  - model_name: qwen-3.5-122b
    litellm_params:
      model: fireworks_ai/accounts/fireworks/models/qwen-3p5-122b-instruct
      api_key: os.environ/FIREWORKS_API_KEY
  - model_name: qwen-3.5-9b
    litellm_params:
      model: fireworks_ai/accounts/fireworks/models/qwen-3p5-9b-instruct
      api_key: os.environ/FIREWORKS_API_KEY
  - model_name: llama-3.3-70b
    litellm_params:
      model: fireworks_ai/accounts/fireworks/models/llama-v3p3-70b-instruct
      api_key: os.environ/FIREWORKS_API_KEY

litellm_settings:
  drop_params: true              # strip provider-unsupported params (avoid 400s)
  num_retries: 3
  request_timeout: 120
